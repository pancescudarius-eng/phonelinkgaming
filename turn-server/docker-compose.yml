services:
  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - /opt/cosyra/entrypoint.sh
    volumes:
      - ./entrypoint.sh:/opt/cosyra/entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "turnutils_uclient -p 3478 -W \"$$TURN_PASSWORD\" -u \"$$TURN_USERNAME\" 127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
