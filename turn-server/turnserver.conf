# This file is retained only as documentation.
# The production container generates /tmp/turnserver.conf at startup from .env
# using entrypoint.sh, so credentials are never committed to Git.

listening-port=3478
fingerprint
lt-cred-mech
realm=${TURN_REALM}
user=${TURN_USERNAME}:${TURN_PASSWORD}
external-ip=${TURN_EXTERNAL_IP}
min-port=${TURN_MIN_PORT}
max-port=${TURN_MAX_PORT}
no-multicast-peers
no-cli
no-loopback-peers
stale-nonce=600
