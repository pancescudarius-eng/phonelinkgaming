listening-port=3478
tls-listening-port=5349
fingerprint
lt-cred-mech
realm=turn.cosyra.example
user=cosyra:CHANGE_THIS_PASSWORD

# Replace with the public IPv4 of the TURN server when it is behind NAT.
# external-ip=203.0.113.10

min-port=49160
max-port=49200
no-multicast-peers
no-cli
no-loopback-peers
stale-nonce=600

# Add real TLS files before enabling turns: URLs.
# cert=/etc/letsencrypt/live/turn.cosyra.example/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.cosyra.example/privkey.pem
