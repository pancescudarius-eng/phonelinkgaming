name: Cosyra CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnose network and DNS
        run: |
          echo "--- resolv.conf ---"
          cat /etc/resolv.conf || true
          echo "--- DNS lookups ---"
          getent hosts github.com || true
          getent hosts services.gradle.org || true
          getent hosts repo.maven.apache.org || true
          getent hosts dl.google.com || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Run unit tests and build debug APK with retries
        shell: bash
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            echo "Gradle attempt $attempt of 3"
            if gradle --no-daemon --stacktrace testDebugUnitTest assembleDebug; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Build failed; waiting before retry in case DNS/network is transient"
              sleep $((attempt * 20))
            fi
          done
          exit 1

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cosyra-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  signaling-server-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: signaling-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: signaling-server/package.json

      - name: Install server dependencies with retries
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "npm attempt $attempt of 3"
            if npm install --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=60000; then
              exit 0
            fi
            sleep $((attempt * 15))
          done
          exit 1

      - name: Validate server syntax
        run: node --check server.js

      - name: Verify server health endpoint
        run: |
          node server.js > /tmp/cosyra-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 2
          curl --fail --retry 3 --retry-delay 2 http://127.0.0.1:8080/health
